<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoyaCode | Motivation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --c-teal:#00E5A0;--c-teal-mid:#00B87A;--c-teal-dim:rgba(0,229,160,0.15);--c-teal-faint:rgba(0,229,160,0.07);
      --c-blue:#60A5FA;--c-blue-dim:rgba(96,165,250,0.12);
      --c-coral:#FB7185;--c-coral-dim:rgba(251,113,133,0.12);
      --c-amber:#FCD34D;--c-amber-dim:rgba(252,211,77,0.12);
      --c-green:#4ADE80;--c-green-dim:rgba(74,222,128,0.12);
      --c-purple:#A78BFA;--c-purple-dim:rgba(167,139,250,0.12);
      --bg-0:#030712;--bg-1:#060D1F;--bg-2:#0A1628;--bg-3:#0F1F38;
      --glass:rgba(10,22,40,0.6);--glass-border:rgba(255,255,255,0.07);--glass-hi:rgba(255,255,255,0.12);
      --t-100:#F8FAFF;--t-200:#CBD5F0;--t-400:#7A8FAD;--t-600:#3D506A;--t-700:#243350;
      --f-display:'Bricolage Grotesque',sans-serif;--f-body:'Space Grotesk',sans-serif;
      --ease:cubic-bezier(0.4,0,0.2,1);--spring:cubic-bezier(0.34,1.4,0.64,1);
      --dur-fast:150ms;--dur-mid:250ms;--dur-slow:400ms;
      --sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:24px;--sp-8:32px;
      --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;--r-2xl:24px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--f-body);background:var(--bg-0);color:var(--t-100);overflow-x:hidden;-webkit-font-smoothing:antialiased;padding-bottom:100px;animation:fadeUp var(--dur-slow) var(--spring) both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    /* Orbs */
    .bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(120px);will-change:transform}
    .orb-1{width:900px;height:900px;background:radial-gradient(circle,rgba(0,229,160,0.18) 0%,transparent 65%);top:-30%;left:-20%;animation:da 25s ease-in-out infinite}
    .orb-2{width:700px;height:700px;background:radial-gradient(circle,rgba(96,165,250,0.14) 0%,transparent 65%);top:10%;right:-15%;animation:db 30s ease-in-out infinite}
    .orb-3{width:600px;height:600px;background:radial-gradient(circle,rgba(251,113,133,0.09) 0%,transparent 65%);bottom:0;left:25%;animation:dc 22s ease-in-out infinite}
    @keyframes da{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(80px,-60px) scale(1.1)}70%{transform:translate(-30px,50px) scale(.92)}}
    @keyframes db{0%,100%{transform:translate(0,0)}50%{transform:translate(-100px,80px) scale(1.08)}}
    @keyframes dc{0%,100%{transform:translate(0,0)}60%{transform:translate(60px,-40px) scale(1.05)}}

    /* Nav */
    nav{position:fixed;top:16px;left:0;right:0;z-index:900;pointer-events:none}
    .nav-inner{width:min(1160px,90vw);margin:0 auto;background:rgba(6,13,31,0.75);backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--glass-hi);border-radius:var(--r-2xl);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;pointer-events:all;box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 0 0 1px rgba(255,255,255,0.03)}
    .logo{display:flex;align-items:center;gap:var(--sp-2);text-decoration:none;font-family:var(--f-display);font-size:1.15rem;font-weight:800;color:var(--t-100);letter-spacing:-0.03em}
    .logo-mark{width:28px;height:28px;border-radius:var(--r-sm);background:var(--c-teal);display:flex;align-items:center;justify-content:center}
    .nav-back{padding:8px 16px;border-radius:var(--r-md);background:var(--glass);border:1px solid var(--glass-border);color:var(--t-400);font-size:0.875rem;font-weight:600;text-decoration:none;transition:color var(--dur-fast) var(--ease),background var(--dur-fast) var(--ease)}
    .nav-back:hover{color:var(--t-100);background:var(--glass-hi)}

    /* Progress */
    .progress-wrap{position:relative;z-index:1;padding-top:90px}
    .progress-track{width:min(860px,90vw);margin:0 auto;height:6px;border-radius:999px;background:var(--glass-border);overflow:hidden}
    .progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--c-teal),var(--c-blue));animation:pgrow .8s var(--spring) .3s both}
    @keyframes pgrow{from{width:25%}to{width:50%}}

    /* Steps */
    .steps{width:min(860px,90vw);margin:14px auto 0;display:flex;flex-direction:column;gap:6px;position:relative;z-index:1}
    .step-line{display:flex;align-items:center}
    .step-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .step-dot.done{background:var(--c-teal)}
    .step-dot.current{background:var(--c-teal);box-shadow:0 0 0 3px var(--c-teal-faint)}
    .step-dot.upcoming{background:var(--glass-border)}
    .connector{flex:1;height:2px;background:var(--glass-border)}
    .connector.done{background:var(--c-teal)}
    .step-labels{display:flex;justify-content:space-between;font-size:.68rem;font-weight:600;color:var(--t-600);letter-spacing:.06em;text-transform:uppercase}
    .step-labels span:nth-child(2){color:var(--c-teal)}

    /* Page */
    .page{position:relative;z-index:1;width:min(1160px,90vw);margin:0 auto;padding:32px 0 24px}

    /* Mascot + bubble */
    .intro{display:flex;align-items:center;gap:20px;margin-bottom:32px}
    .mascot{width:110px;height:110px;border-radius:var(--r-2xl);background:var(--glass);backdrop-filter:blur(20px) saturate(160%);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
    .mascot::after{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--glass-hi),transparent)}
    .bubble{position:relative;flex:1;background:var(--glass);backdrop-filter:blur(20px) saturate(160%);border:1px solid var(--glass-border);border-radius:var(--r-2xl);padding:20px 24px;font-family:var(--f-display);font-size:clamp(1.2rem,2.5vw,1.8rem);font-weight:800;letter-spacing:-.02em;line-height:1.2;color:var(--t-100);box-shadow:0 8px 32px rgba(0,0,0,0.25)}
    .bubble::after{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,var(--glass-hi),transparent)}
    .bubble::before{content:'';position:absolute;left:-9px;top:44%;width:16px;height:16px;transform:rotate(45deg);background:var(--bg-2);border-left:1px solid var(--glass-border);border-bottom:1px solid var(--glass-border)}

    /* Section header */
    .eyebrow{display:flex;align-items:center;gap:10px;color:var(--c-teal);font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:var(--sp-3)}
    .eyebrow::before{content:'';display:block;width:20px;height:1.5px;background:var(--c-teal);border-radius:999px}
    .s-h2{font-family:var(--f-display);font-size:clamp(1.8rem,3.5vw,2.6rem);font-weight:800;letter-spacing:-.03em;line-height:1.05;color:var(--t-100);margin-bottom:var(--sp-2)}
    .s-p{color:var(--t-400);font-size:1rem;line-height:1.7;margin-bottom:var(--sp-8)}

    /* Choice grid */
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}

    /* Choice card */
    .choice{position:relative;overflow:hidden;display:flex;align-items:center;gap:16px;width:100%;padding:20px 22px;border-radius:var(--r-2xl);background:var(--glass);backdrop-filter:blur(20px) saturate(160%);border:1px solid var(--glass-border);font-family:var(--f-body);font-size:1rem;font-weight:700;color:var(--t-200);text-align:left;cursor:pointer;transition:transform var(--dur-mid) var(--spring),border-color var(--dur-mid) var(--ease),box-shadow var(--dur-mid) var(--ease),color var(--dur-fast) var(--ease);min-height:72px}
    .choice::after{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,var(--glass-hi),transparent)}
    .choice:hover{transform:translateY(-3px);border-color:rgba(255,255,255,0.14);color:var(--t-100);box-shadow:0 12px 36px rgba(0,0,0,0.2)}
    .choice:active{transform:translateY(0)}
    .choice.selected{color:var(--t-100);transform:translateY(-2px)}

    /* Per-card accent colors */
    .choice.selected.v1{border-color:rgba(0,229,160,.4);box-shadow:0 0 0 2px rgba(0,229,160,.12),0 12px 40px rgba(0,229,160,.1)}
    .choice.selected.v2{border-color:rgba(96,165,250,.4);box-shadow:0 0 0 2px rgba(96,165,250,.12),0 12px 40px rgba(96,165,250,.1)}
    .choice.selected.v3{border-color:rgba(251,113,133,.4);box-shadow:0 0 0 2px rgba(251,113,133,.12),0 12px 40px rgba(251,113,133,.1)}
    .choice.selected.v4{border-color:rgba(74,222,128,.4);box-shadow:0 0 0 2px rgba(74,222,128,.12),0 12px 40px rgba(74,222,128,.1)}
    .choice.selected.v5{border-color:rgba(167,139,250,.4);box-shadow:0 0 0 2px rgba(167,139,250,.12),0 12px 40px rgba(167,139,250,.1)}
    .choice.selected.v6{border-color:rgba(252,211,77,.4);box-shadow:0 0 0 2px rgba(252,211,77,.12),0 12px 40px rgba(252,211,77,.1)}

    /* Icon */
    .c-icon{width:44px;height:44px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;transition:transform var(--dur-fast) var(--spring)}
    .choice:hover .c-icon,.choice.selected .c-icon{transform:scale(1.1)}
    .v1 .c-icon{background:var(--c-teal-dim)}
    .v2 .c-icon{background:var(--c-blue-dim)}
    .v3 .c-icon{background:var(--c-coral-dim)}
    .v4 .c-icon{background:var(--c-green-dim)}
    .v5 .c-icon{background:var(--c-purple-dim)}
    .v6 .c-icon{background:var(--c-amber-dim)}

    /* Check indicator */
    .c-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--glass-border);margin-left:auto;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background var(--dur-fast) var(--ease),border-color var(--dur-fast) var(--ease)}
    .choice.selected .c-check{background:var(--c-teal);border-color:var(--c-teal)}
    .check-svg{opacity:0;transition:opacity var(--dur-fast) var(--ease)}
    .choice.selected .check-svg{opacity:1}

    /* Footer */
    .footer-bar{position:fixed;left:0;right:0;bottom:0;z-index:800;border-top:1px solid var(--glass-border);background:rgba(6,13,31,0.88);backdrop-filter:blur(24px) saturate(180%);padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
    .footer-hint{font-size:.8rem;color:var(--t-600);font-weight:500}
    .footer-hint .hl{font-weight:700;color:var(--c-teal)}
    .cont-btn{display:inline-flex;align-items:center;gap:var(--sp-2);padding:13px 28px;border-radius:var(--r-lg);background:rgba(255,255,255,0.05);border:1px solid var(--glass-border);color:var(--t-700);font-family:var(--f-body);font-weight:700;font-size:.92rem;text-decoration:none;cursor:not-allowed;pointer-events:none;transition:transform var(--dur-fast) var(--spring),box-shadow var(--dur-mid) var(--ease),background var(--dur-fast) var(--ease),color var(--dur-fast) var(--ease)}
    .cont-btn.on{pointer-events:auto;cursor:pointer;background:var(--c-teal);color:var(--bg-0);border-color:transparent;box-shadow:0 0 36px rgba(0,229,160,.35),0 4px 12px rgba(0,229,160,.2)}
    .cont-btn.on:hover{transform:translateY(-3px);box-shadow:0 0 56px rgba(0,229,160,.5),0 8px 20px rgba(0,229,160,.3)}
    .cont-btn.on:active{transform:translateY(0)}
    .arr{transition:transform var(--dur-fast) var(--spring)}
    .cont-btn.on:hover .arr{transform:translateX(4px)}

    @media(max-width:760px){
      .intro{align-items:flex-start}
      .mascot{width:84px;height:84px}
      .bubble{font-size:1.05rem}
      .bubble::before{top:26px}
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<div class="bg-canvas" aria-hidden="true">
  <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
</div>

<nav role="navigation" aria-label="Main navigation">
  <div class="nav-inner">
    <a href="index.html" class="logo" aria-label="MoyaCode home">
      <div class="logo-mark" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M8 6l4-4 4 4M8 18l4 4 4-4M3 12h18" stroke="#030712" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      MoyaCode
    </a>
    <a href="discovery.html" class="nav-back">← Back</a>
  </div>
</nav>

<div class="progress-wrap">
  <div class="progress-track" role="progressbar" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100">
    <div class="progress-fill"></div>
  </div>
</div>

<div class="steps">
  <div class="step-line">
    <div class="step-dot done"></div>
    <div class="connector done"></div>
    <div class="step-dot current"></div>
    <div class="connector"></div>
    <div class="step-dot upcoming"></div>
  </div>
  <div class="step-labels">
    <span>Discovery</span><span>Motivation</span><span>Goal</span>
  </div>
</div>

<main class="page">

  <section class="intro" aria-label="MoyaBot prompt">
    <div class="mascot" aria-label="MoyaBot">
      <svg width="70" height="70" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MoyaBot robot">
        <rect x="68" y="70" width="124" height="96" rx="24" fill="#ffffff" stroke="#c9e2f5" stroke-width="8"/>
        <circle cx="108" cy="114" r="11" fill="#60A5FA"/>
        <circle cx="152" cy="114" r="11" fill="#60A5FA"/>
        <rect x="102" y="136" width="56" height="10" rx="5" fill="#00E5A0"/>
        <line x1="130" y1="70" x2="130" y2="46" stroke="#c9e2f5" stroke-width="8"/>
        <circle cx="130" cy="40" r="8" fill="#00E5A0"/>
      </svg>
    </div>
    <div class="bubble">What is your coding superpower for?</div>
  </section>

  <div class="eyebrow">Step 2 of 3</div>
  <h1 class="s-h2">What drives you to code?</h1>
  <p class="s-p">MoyaBot uses your answer to personalise encouragement and tips throughout your journey.</p>

  <section class="grid" aria-label="Motivation options">

    <button class="choice v1" type="button" data-motivation="Support my education" aria-pressed="false">
      <div class="c-icon" aria-hidden="true">📚</div>
      <span>Support my education</span>
      <div class="c-check" aria-hidden="true">
        <svg class="check-svg" width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M2 5l2.5 2.5L8 3" stroke="#030712" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </button>

    <button class="choice v2" type="button" data-motivation="Boost my future career" aria-pressed="false">
      <div class="c-icon" aria-hidden="true">💼</div>
      <span>Boost my future career</span>
      <div class="c-check" aria-hidden="true">
        <svg class="check-svg" width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M2 5l2.5 2.5L8 3" stroke="#030712" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </button>

    <button class="choice v3" type="button" data-motivation="Build my own startup" aria-pressed="false">
      <div class="c-icon" aria-hidden="true">🚀</div>
      <span>Build my own startup</span>
      <div class="c-check" aria-hidden="true">
        <svg class="check-svg" width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M2 5l2.5 2.5L8 3" stroke="#030712" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </button>

    <button class="choice v4" type="button" data-motivation="Help my community" aria-pressed="false">
      <div class="c-icon" aria-hidden="true">🤝</div>
      <span>Help my community</span>
      <div class="c-check" aria-hidden="true">
        <svg class="check-svg" width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M2 5l2.5 2.5L8 3" stroke="#030712" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </button>

    <button class="choice v5" type="button" data-motivation="Solve hard problems" aria-pressed="false">
      <div class="c-icon" aria-hidden="true">🧠</div>
      <span>Solve hard problems</span>
      <div class="c-check" aria-hidden="true">
        <svg class="check-svg" width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M2 5l2.5 2.5L8 3" stroke="#030712" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </button>

    <button class="choice v6" type="button" data-motivation="Just for fun" aria-pressed="false">
      <div class="c-icon" aria-hidden="true">🎉</div>
      <span>Just for fun</span>
      <div class="c-check" aria-hidden="true">
        <svg class="check-svg" width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M2 5l2.5 2.5L8 3" stroke="#030712" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </button>

  </section>

</main>

<footer class="footer-bar">
  <span class="footer-hint" id="hint">Tell MoyaBot what drives you</span>
  <a id="cont" class="cont-btn" href="goals.html" aria-disabled="true" role="button">
    Continue <span class="arr" aria-hidden="true">→</span>
  </a>
</footer>

<script>
  const choices = document.querySelectorAll('.choice');
  const cont    = document.getElementById('cont');
  const hint    = document.getElementById('hint');
  let chosen    = '';

  choices.forEach(card => {
    card.addEventListener('click', () => {
      choices.forEach(c => { c.classList.remove('selected'); c.setAttribute('aria-pressed','false'); });
      card.classList.add('selected');
      card.setAttribute('aria-pressed','true');
      chosen = card.dataset.motivation;
      hint.innerHTML = `<span class="hl">${chosen}</span> selected`;
      cont.classList.add('on');
      cont.setAttribute('aria-disabled','false');
    });
  });

  cont.addEventListener('click', e => {
    if (!chosen) { e.preventDefault(); return; }
    localStorage.setItem('moyacode_motivation', chosen);
  });
</script>
<script type="module">
import { getSession } from './js/auth.js';
import { saveProfile, loadProfile } from './js/db.js';
document.querySelector('a[href]')?.addEventListener('click', async () => {
  const session = await getSession();
  if (!session) return;
  const existing = await loadProfile(session.user.id);
  await saveProfile(session.user.id, {
    dream:      existing.dream || localStorage.getItem('moyacode_dream') || '',
    motivation: localStorage.getItem('moyacode_motivation') || '',
    goal:       existing.goal || '',
  });
});
</script>

</body>
</html>
