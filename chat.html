<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MoyaCode — Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --teal:#00E5A0;--teal-dim:rgba(0,229,160,.14);--teal-faint:rgba(0,229,160,.06);
    --bg0:#030712;--bg1:#070E20;--bg2:#0B1424;--line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.12);
    --ink:#F4F7FF;--mut:#8094B0;--mut2:#4A5C78;
    --fd:'Bricolage Grotesque',sans-serif;--fb:'Space Grotesk',sans-serif;--fm:'DM Mono',monospace;
    --ease:cubic-bezier(.4,0,.2,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:var(--fb);background:var(--bg0);color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden}
  .app{display:grid;grid-template-columns:248px 1fr;height:100dvh}

  /* sidebar */
  .side{background:var(--bg1);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
  .side-top{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .mk{width:30px;height:30px;border-radius:9px;background:var(--teal);display:grid;place-items:center;box-shadow:0 0 18px rgba(0,229,160,.4);flex-shrink:0}
  .ws-name{font-family:var(--fd);font-weight:800;font-size:1.05rem;letter-spacing:-.02em;line-height:1}
  .ws-sub{font-family:var(--fm);font-size:.6rem;color:var(--mut2);letter-spacing:.12em;text-transform:uppercase;margin-top:3px}
  .side-scroll{flex:1;overflow-y:auto;padding:14px 10px}
  .grp{font-family:var(--fm);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mut2);padding:14px 10px 6px}
  .chan{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:0;color:var(--mut);font-family:var(--fb);font-size:.93rem;font-weight:500;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background var(--ease) .12s,color var(--ease) .12s}
  .chan:hover{background:rgba(255,255,255,.04);color:var(--ink)}
  .chan.active{background:var(--teal-dim);color:var(--ink);font-weight:600}
  .chan .h{color:var(--mut2);font-weight:600}
  .chan.active .h{color:var(--teal)}
  .chan .av{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-size:.7rem;flex-shrink:0}
  .moya-pin{margin:10px;padding:11px 12px;border:1px solid var(--teal-dim);background:var(--teal-faint);border-radius:12px;display:flex;gap:10px;align-items:center}
  .moya-pin .av{width:30px;height:30px;border-radius:8px;background:var(--bg2);border:1px solid var(--teal-dim);display:grid;place-items:center;flex-shrink:0}
  .moya-pin b{font-family:var(--fd);font-size:.9rem}
  .moya-pin small{display:block;color:var(--mut);font-size:.74rem;margin-top:1px}
  .side-foot{border-top:1px solid var(--line);padding:12px 14px;display:flex;align-items:center;gap:10px}
  .ava{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;font-weight:700;font-size:.8rem;flex-shrink:0;color:#06121f}
  .side-foot .nm{font-size:.86rem;font-weight:600}
  .side-foot .st{font-size:.7rem;color:var(--mut)}

  /* main */
  .main{display:flex;flex-direction:column;min-width:0;min-height:0;background:var(--bg0)}
  .head{height:60px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 20px;flex-shrink:0}
  .burger{display:none;background:none;border:1px solid var(--line2);color:var(--ink);border-radius:8px;width:36px;height:36px;cursor:pointer;font-size:1.1rem}
  .head h1{font-family:var(--fd);font-size:1.1rem;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:7px}
  .head h1 .h{color:var(--mut2)}
  .head .topic{color:var(--mut);font-size:.84rem;border-left:1px solid var(--line2);padding-left:12px;margin-left:2px}
  @media(max-width:560px){.head .topic{display:none}}
  .ask-moya{margin-left:auto;display:inline-flex;align-items:center;gap:7px;background:var(--teal-faint);border:1px solid var(--teal-dim);color:var(--teal);font-family:var(--fb);font-weight:600;font-size:.84rem;padding:8px 14px;border-radius:999px;cursor:pointer;transition:background var(--ease) .12s,transform var(--ease) .12s;flex-shrink:0}
  .ask-moya:hover{background:var(--teal-dim);transform:translateY(-1px)}

  .stream{flex:1;overflow-y:auto;padding:20px 20px 8px;display:flex;flex-direction:column;gap:2px}
  .msg{display:flex;gap:12px;padding:9px 8px;border-radius:10px}
  .msg:hover{background:rgba(255,255,255,.02)}
  .msg .av{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-weight:700;font-size:.92rem;flex-shrink:0;color:#06121f}
  .msg .body{min-width:0;flex:1}
  .msg .meta{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
  .msg .who{font-family:var(--fd);font-weight:700;font-size:.93rem}
  .tag{font-family:var(--fm);font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:999px}
  .tag.tutor{background:rgba(96,165,250,.16);color:#9CC4FB}
  .tag.ai{background:var(--teal-dim);color:var(--teal)}
  .tag.you{background:rgba(255,255,255,.08);color:var(--mut)}
  .msg .time{font-family:var(--fm);font-size:.68rem;color:var(--mut2)}
  .msg .text{font-size:.97rem;line-height:1.6;color:#DCE5F5;word-wrap:break-word}
  .msg .text code{font-family:var(--fm);font-size:.88em;background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:var(--teal)}
  .mention{color:var(--teal);background:var(--teal-faint);border-radius:5px;padding:0 4px;font-weight:600}
  /* Moya reply card */
  .msg.ai .av{background:var(--bg2);border:1px solid var(--teal-dim);color:var(--teal)}
  .msg.ai .body{background:var(--teal-faint);border:1px solid var(--teal-dim);border-left:2px solid var(--teal);border-radius:12px;padding:11px 14px;margin-top:-2px}
  .typing{display:inline-flex;gap:4px;padding:4px 0}
  .typing i{width:6px;height:6px;border-radius:50%;background:var(--teal);opacity:.5;animation:b 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
  @keyframes b{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

  /* composer */
  .composer{padding:10px 18px 18px;flex-shrink:0}
  .box{border:1px solid var(--line2);border-radius:14px;background:var(--bg1);padding:10px 12px;transition:border-color var(--ease) .15s}
  .box:focus-within{border-color:var(--teal-dim)}
  .box textarea{width:100%;background:none;border:0;resize:none;color:var(--ink);font-family:var(--fb);font-size:.97rem;line-height:1.5;outline:none;max-height:120px}
  .box textarea::placeholder{color:var(--mut2)}
  .bar{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
  .hint{font-family:var(--fm);font-size:.7rem;color:var(--mut2)}
  .hint b{color:var(--teal)}
  .send{background:var(--teal);color:#06121f;border:0;border-radius:9px;padding:8px 16px;font-family:var(--fb);font-weight:700;font-size:.86rem;cursor:pointer;transition:filter var(--ease) .12s,transform var(--ease) .12s}
  .send:hover{filter:brightness(1.06);transform:translateY(-1px)}

  .backdrop{display:none}
  @media(max-width:760px){
    .app{grid-template-columns:1fr}
    .side{position:fixed;inset:0 auto 0 0;width:264px;z-index:40;transform:translateX(-100%);transition:transform var(--ease) .2s}
    .side.open{transform:translateX(0)}
    .burger{display:grid;place-items:center}
    .backdrop.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:30}
  }
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="side" id="side">
    <div class="side-top">
      <span class="mk"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M8 6l4-4 4 4M8 18l4 4 4-4M3 12h18" stroke="#030712" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      <div><div class="ws-name">MoyaCode</div><div class="ws-sub">Workspace</div></div>
    </div>

    <div class="moya-pin">
      <span class="av"><svg width="18" height="18" viewBox="0 0 260 260"><rect x="68" y="74" width="124" height="92" rx="22" fill="#00E5A0" opacity=".15" stroke="#00E5A0" stroke-width="8"/><circle cx="108" cy="116" r="10" fill="#00E5A0"/><circle cx="152" cy="116" r="10" fill="#00E5A0"/><rect x="104" y="138" width="52" height="9" rx="4" fill="#00E5A0"/></svg></span>
      <div><b>MoyaBot</b><small>Tag <span style="color:var(--teal)">@moyabot</span> anywhere to ask</small></div>
    </div>

    <div class="side-scroll" id="chanList"></div>

    <div class="side-foot">
      <span class="ava" style="background:#FCD34D">A</span>
      <div><div class="nm">Ade</div><div class="st">Student · Owo</div></div>
    </div>
  </aside>
  <div class="backdrop" id="backdrop" onclick="toggleSide(false)"></div>

  <!-- MAIN -->
  <main class="main">
    <div class="head">
      <button class="burger" onclick="toggleSide(true)" aria-label="Channels">☰</button>
      <h1><span class="h">#</span><span id="chanName">html</span></h1>
      <span class="topic" id="chanTopic">Learn HTML with your class and MoyaBot</span>
      <button class="ask-moya" onclick="askPrefill()">✦ Ask MoyaBot</button>
    </div>

    <div class="stream" id="stream"></div>

    <div class="composer">
      <div class="box">
        <textarea id="input" rows="1" placeholder="Message #html   ·   type @moyabot to ask the AI"></textarea>
        <div class="bar">
          <span class="hint">Tag <b>@moyabot</b> to get a truth-check or a quick explanation</span>
          <button class="send" onclick="send()">Send</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
/* ---- data: each channel is a class ---- */
const CH = {
  welcome:{name:'welcome', topic:'Start here', msgs:[
    {who:'MoyaBot',role:'ai',av:'M',t:'8:00',text:"Welcome to your MoyaCode workspace. Each channel is a class. I'm Moya, your sidekick. Tag <span class='mention'>@moyabot</span> in any message and I'll explain, check facts, or help you practice."},
  ]},
  html:{name:'html', topic:'Learn HTML with your class and MoyaBot', msgs:[
    {who:'Chidi',role:'tutor',av:'C',c:'#60A5FA',t:'9:12',text:"Today: every page is built from tags. <code>&lt;h1&gt;</code> is a heading, <code>&lt;p&gt;</code> is a paragraph. Try writing a heading that says your name."},
    {who:'Ade',role:'you',av:'A',c:'#FCD34D',t:'9:14',text:"so &lt;h1&gt;Ade&lt;/h1&gt; ? and does the order of tags matter"},
    {who:'Chidi',role:'tutor',av:'C',c:'#60A5FA',t:'9:15',text:"Yes that's correct. Order matters for how things stack top to bottom."},
    {who:'Ade',role:'you',av:'A',c:'#FCD34D',t:'9:16',text:"<span class='mention'>@moyabot</span> is it true that a page can have more than one h1?"},
    {who:'MoyaBot',role:'ai',av:'M',t:'9:16',text:"Good truth-check. Technically yes, a page can contain multiple <code>&lt;h1&gt;</code> tags and it will still render. But the clean practice is one <code>&lt;h1&gt;</code> per page (your main title), then <code>&lt;h2&gt;</code> and <code>&lt;h3&gt;</code> for sections. Screen readers and search engines rely on that order. So Chidi is right that order matters, and one h1 is the habit to build."},
  ]},
  css:{name:'css', topic:'Style and layout', msgs:[
    {who:'MoyaBot',role:'ai',av:'M',t:'10:01',text:"This is the CSS class. Ask me <span class='mention'>@moyabot</span> anything, like why your box is not centering."},
  ]},
  javascript:{name:'javascript', topic:'Logic and interactivity', msgs:[
    {who:'MoyaBot',role:'ai',av:'M',t:'10:30',text:"JavaScript class. Tag <span class='mention'>@moyabot</span> to debug an error message together."},
  ]},
};
const CH_ORDER = ['welcome','html','css','javascript'];
let active = 'html';

const $ = id => document.getElementById(id);
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function renderChannels(){
  const l = $('chanList');
  l.innerHTML = '<div class="grp">Classes</div>' + CH_ORDER.map(k=>{
    const c = CH[k];
    return `<button class="chan ${k===active?'active':''}" onclick="openCh('${k}')"><span class="h">#</span>${c.name}</button>`;
  }).join('') + `<div class="grp">Tutors</div>
    <button class="chan"><span class="av" style="background:#60A5FA;color:#06121f">C</span>Chidi</button>
    <button class="chan"><span class="av" style="background:#A78BFA;color:#06121f">B</span>Mr. Bayo</button>`;
}
function avatar(m){
  if(m.role==='ai') return `<span class="av"><svg width="20" height="20" viewBox="0 0 260 260"><rect x="68" y="74" width="124" height="92" rx="22" fill="none" stroke="#00E5A0" stroke-width="9"/><circle cx="108" cy="116" r="10" fill="#00E5A0"/><circle cx="152" cy="116" r="10" fill="#00E5A0"/><rect x="104" y="138" width="52" height="9" rx="4" fill="#00E5A0"/></svg></span>`;
  return `<span class="av" style="background:${m.c||'#FCD34D'}">${m.av}</span>`;
}
function tagFor(m){
  if(m.role==='tutor') return '<span class="tag tutor">Tutor</span>';
  if(m.role==='ai') return '<span class="tag ai">AI · sidekick</span>';
  if(m.role==='you') return '<span class="tag you">You</span>';
  return '';
}
function renderStream(){
  const c = CH[active];
  $('chanName').textContent = c.name;
  $('chanTopic').textContent = c.topic;
  $('input').placeholder = `Message #${c.name}   ·   type @moyabot to ask the AI`;
  $('stream').innerHTML = c.msgs.map(m=>`
    <div class="msg ${m.role==='ai'?'ai':''}">
      ${avatar(m)}
      <div class="body">
        <div class="meta"><span class="who">${m.who}</span>${tagFor(m)}<span class="time">${m.t}</span></div>
        <div class="text">${m.text}</div>
      </div>
    </div>`).join('');
  $('stream').scrollTop = $('stream').scrollHeight;
}
function openCh(k){ active=k; renderChannels(); renderStream(); toggleSide(false); }

function now(){ return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }

function send(){
  const inp = $('input'); const raw = inp.value.trim(); if(!raw) return;
  const html = esc(raw).replace(/@moyabot/gi,"<span class='mention'>@moyabot</span>");
  CH[active].msgs.push({who:'Ade',role:'you',av:'A',c:'#FCD34D',t:now(),text:html});
  inp.value=''; inp.style.height='auto'; renderStream();
  if(/@moyabot/i.test(raw)) askMoya(raw);
}

function askMoya(q){
  // prototype sidekick: shows the interaction; wire to /api/assistant for real answers later
  const c = CH[active];
  c.msgs.push({who:'MoyaBot',role:'ai',av:'M',t:now(),text:"<span class='typing'><i></i><i></i><i></i></span>",_typing:true});
  renderStream();
  setTimeout(()=>{
    c.msgs = c.msgs.filter(m=>!m._typing);
    c.msgs.push({who:'MoyaBot',role:'ai',av:'M',t:now(),text:moyaReply(q)});
    renderStream();
  }, 1100);
}
function moyaReply(q){
  const ql = q.toLowerCase();
  if(ql.includes('true')||ql.includes('is it')||ql.includes('correct'))
    return "Let me check that with you. Short answer: it depends on the detail, so here is the honest version, with the one caveat that matters. (In the live version I answer from the lesson and trusted sources, and show you where the answer comes from.)";
  if(ql.includes('?')||ql.includes('how')||ql.includes('why')||ql.includes('what'))
    return "Good question. Here is the simplest correct way to think about it, then one example you can try right now. (This is a design preview. Connect me to the assistant and I will answer for real, grounded in your class.)";
  return "I'm here. Ask me to explain, check a fact, or give you a quick exercise. (Design preview, real answers come when I'm wired to the assistant.)";
}

function askPrefill(){
  const i=$('input'); i.value='@moyabot '; i.focus();
  i.style.height='auto'; i.style.height=Math.min(i.scrollHeight,120)+'px';
}
function toggleSide(open){
  $('side').classList.toggle('open', open);
  $('backdrop').classList.toggle('show', open);
}
const ta = document.getElementById('input');
ta.addEventListener('input', ()=>{ ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,120)+'px'; });
ta.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });

renderChannels(); renderStream();
</script>
</body>
</html>
