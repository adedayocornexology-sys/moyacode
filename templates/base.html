<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MoyaCode{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@10..48,400..800&family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/tokens.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-0);
      color: var(--t-100);
      font-family: var(--f-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { text-decoration: none; color: inherit; }

    /* ── Nav ─────────────────────────────────── */
    .nav {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px clamp(16px, 5vw, 56px);
      background: rgba(3, 7, 18, 0.72);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--glass-border);
    }
    .logo { display: flex; align-items: center; gap: 9px; font-family: var(--f-display); font-weight: 700; font-size: 1.1rem; letter-spacing: -0.01em; }
    .logo-mark { width: 30px; height: 30px; border-radius: 9px; background: var(--c-teal); display: grid; place-items: center; box-shadow: 0 0 22px rgba(0,229,160,0.35); }
    .nav-center { display: flex; gap: 4px; }
    .nav-link { padding: 7px 14px; border-radius: var(--r-md); color: var(--t-400); font-size: 0.9rem; font-weight: 500; transition: color var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease); }
    .nav-link:hover { color: var(--t-100); background: var(--glass-hi); }
    .nav-link.active { color: var(--c-teal); }
    .nav-cta { padding: 9px 20px; border-radius: var(--r-lg); background: var(--c-teal); color: var(--bg-0); font-weight: 700; font-size: 0.875rem; transition: transform var(--dur-fast) var(--spring), filter var(--dur-fast) var(--ease); box-shadow: 0 0 28px rgba(0,229,160,0.3); }
    .nav-cta:hover { transform: translateY(-1px); filter: brightness(1.08); }
    @media (max-width: 720px) { .nav-center { display: none; } }

    main { flex: 1; }

    /* ── Footer ──────────────────────────────── */
    .footer { border-top: 1px solid var(--glass-border); padding: 28px clamp(16px, 5vw, 56px); display: flex; flex-wrap: wrap; gap: 16px; align-items: center; justify-content: space-between; color: var(--t-400); font-size: 0.85rem; }
    .footer a { color: var(--t-400); transition: color var(--dur-fast) var(--ease); }
    .footer a:hover { color: var(--t-100); }
    .footer-links { display: flex; gap: 18px; flex-wrap: wrap; }

    /* ── Shared page-shell helpers ───────────── */
    .wrap { max-width: 1120px; margin: 0 auto; padding: clamp(40px, 7vw, 88px) clamp(16px, 5vw, 56px); }
    .eyebrow { display: inline-block; font-family: var(--f-mono); font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--c-teal); background: var(--c-teal-faint); border: 1px solid var(--c-teal-dim); padding: 5px 12px; border-radius: 999px; margin-bottom: 18px; }
    .page-h1 { font-family: var(--f-display); font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 700; letter-spacing: -0.02em; line-height: 1.05; }
    .lead { color: var(--t-200); font-size: clamp(1rem, 2vw, 1.2rem); max-width: 620px; margin-top: 16px; line-height: 1.55; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <a href="/" class="logo" aria-label="MoyaCode home">
      <span class="logo-mark" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M8 6l4-4 4 4M8 18l4 4 4-4M3 12h18" stroke="#030712" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>MoyaCode
    </a>
    <div class="nav-center" role="list">
      <a href="/features" class="nav-link {% block nav_features %}{% endblock %}" role="listitem">Features</a>
      <a href="/tracks" class="nav-link {% block nav_tracks %}{% endblock %}" role="listitem">Tracks</a>
      <a href="/arcade" class="nav-link {% block nav_arcade %}{% endblock %}" role="listitem">Arcade</a>
      <a href="/about" class="nav-link {% block nav_about %}{% endblock %}" role="listitem">About</a>
      <a href="/schools" class="nav-link {% block nav_schools %}{% endblock %}" role="listitem">Schools</a>
    </div>
    <a href="/onboarding.html" class="nav-cta">Start Free</a>
  </nav>

  <main>{% block content %}{% endblock %}</main>

  <footer class="footer" role="contentinfo">
    <span>Built in Owo · For the next generation of African developers.</span>
    <nav class="footer-links" aria-label="Footer navigation">
      <a href="/features">Features</a>
      <a href="/tracks">Tracks</a>
      <a href="/arcade">Arcade</a>
      <a href="/about">About</a>
      <a href="/schools">For Schools</a>
      <a href="/contact">Contact</a>
      <a href="/privacy">Privacy</a>
      <a href="/child-safety">Child Safety</a>
    </nav>
  </footer>
  {% block scripts %}{% endblock %}
  <script type="module" src="/js/assistant.js"></script>
</body>
</html>
