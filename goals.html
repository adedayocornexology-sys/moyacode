<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoyaCode | Daily Goal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:var(--font-body);background:var(--bg-abyss);color:#3f3f46;padding-bottom:110px}
    .wrap{max-width:860px;margin:0 auto;padding:18px}
    .progress{height:8px;background:#eceff3;border-radius:999px;overflow:hidden;margin:8px 0 20px}.fill{width:35%;height:100%;background:var(--teal)}
    h1{
      font-family: var(--font-display);margin:0 0 8px;font-size:2rem}.sub{margin:0 0 20px;color:#71717a;font-weight:700}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .goal{padding:18px;border-radius:16px;border:2px solid #d7dde6;border-bottom:4px solid #aeb8c4;background:var(--bg-deep);cursor:pointer;font-weight:800;text-align:left}
    .goal small{display:block;color:#6b7280;font-weight:700}.goal.selected{border-color:var(--blue);border-bottom-color:#1596cf;color:var(--blue);box-shadow:0 0 0 3px rgba(28,176,246,.15)}
    .bar{position:fixed;left:0;right:0;bottom:0;border-top:1px solid #e5e7eb;background:var(--bg-deep);padding:16px;display:flex;justify-content:flex-end}
    .btn{min-width:180px;padding:14px 24px;border-radius:16px;border:2px solid #d1d5db;border-bottom:4px solid #a8afb8;background:#cfd4db;color:#fff;text-decoration:none;text-transform:uppercase;font-weight:900;pointer-events:none;display:inline-flex;justify-content:center}
    .btn.on{background:var(--teal);border-color:#55bf02;border-bottom-color:var(--teal-dark);pointer-events:auto}
    @media (max-width:760px){.grid{grid-template-columns:1fr}}
  
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  .home-link{position:fixed;top:14px;left:14px;z-index:120;display:inline-flex;align-items:center;gap:6px;padding:10px 14px;border-radius:999px;border:1px solid rgba(255,255,255,0.16);background:rgba(15,26,46,0.9);color:#F0F4FF;font-weight:800;text-decoration:none;backdrop-filter:blur(4px)}.home-link:hover{background:rgba(22,36,64,0.95)}
  </style>
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body>
  <a class="home-link" href="index.html" aria-label="Go to homepage">← Home</a>
  <main class="wrap">
    <section class="steps" aria-label="Onboarding progress">
      <div class="step-line">
        <div class="step-dot done" aria-hidden="true"></div>
        <div class="connector" aria-hidden="true"></div>
        <div class="step-dot done" aria-hidden="true"></div>
        <div class="connector" aria-hidden="true"></div>
        <div class="step-dot current" aria-hidden="true"></div>
      </div>
      <div class="step-labels">
        <span>Discovery</span>
        <span>Motivation</span>
        <span>Goal</span>
      </div>
    </section>

    <section class="bot-note" aria-label="MoyaBot encouragement">
      <svg width="80" height="80" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MoyaBot">
        <rect x="68" y="70" width="124" height="96" rx="24" fill="#ffffff" stroke="#c9e2f5" stroke-width="8"/>
        <circle cx="108" cy="114" r="11" fill="var(--blue)"/>
        <circle cx="152" cy="114" r="11" fill="var(--blue)"/>
        <rect x="102" y="136" width="56" height="10" rx="5" fill="var(--teal)"/>
        <line x1="130" y1="70" x2="130" y2="46" stroke="#c9e2f5" stroke-width="8"/>
        <circle cx="130" cy="40" r="8" fill="var(--teal)"/>
      </svg>
      <p class="bubble">Your training level shapes your destiny, Hero!</p>
    </section>

    <h1>Choose your hero level</h1>
    <p class="sub">How hard are you willing to train?</p>

    <section class="grid">
      <button class="goal" type="button" style="--accent:#00E5A0;--fill:25%;">5 min/day
        <div class="goal-head"><span class="emoji">🌱</span><span class="tier">Rookie</span><span class="badge">5 min/day</span></div>
        <p class="flavor">Just getting started</p>
        <div class="difficulty-track"><div class="difficulty-fill"></div></div>
      </button>
      <button class="goal" type="button" style="--accent:#3D9BE9;--fill:50%;">10 min/day
        <div class="goal-head"><span class="emoji">⚡</span><span class="tier">Coder</span><span class="badge">10 min/day</span></div>
        <p class="flavor">I am serious about this</p>
        <div class="difficulty-track"><div class="difficulty-fill"></div></div>
      </button>
      <button class="goal" type="button" style="--accent:#FFD166;--fill:75%;">15 min/day
        <div class="goal-head"><span class="emoji">🔥</span><span class="tier">Builder</span><span class="badge">15 min/day</span></div>
        <p class="flavor">I build things daily</p>
        <div class="difficulty-track"><div class="difficulty-fill"></div></div>
      </button>
      <button class="goal" type="button" style="--accent:#FF5C7A;--fill:100%;">20 min/day
        <div class="goal-head"><span class="emoji">🤖</span><span class="tier">Legend</span><span class="badge">20 min/day</span></div>
        <p class="flavor">I eat code for breakfast</p>
        <div class="difficulty-track"><div class="difficulty-fill"></div></div>
      </button>
    </section>

    <p class="goal-note">You can update your goal anytime from your profile</p>
  </main>

  <footer class="bar"><a id="continue" class="btn" href="quiz.html" aria-disabled="true">Continue</a></footer>
  <script>
    const goals = document.querySelectorAll('.goal');
    const btn = document.getElementById('continue');
    let selectedGoal = '';

    goals.forEach((goal) => goal.addEventListener('click', () => {
      goals.forEach((item) => item.classList.remove('selected'));
      goal.classList.add('selected');
      selectedGoal = goal.childNodes[0].textContent.trim();
      btn.classList.add('on');
      btn.setAttribute('aria-disabled', 'false');
    }));

    btn.addEventListener('click', (event) => {
      if (!selectedGoal) {
        event.preventDefault();
        return;
      }

      localStorage.setItem('moyacode_goal', selectedGoal);
    });
  </script>
</body>
</html>
