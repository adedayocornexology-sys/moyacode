<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoyaCode | Daily Goal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:var(--font-body);background:var(--bg-deep);color:#3f3f46;padding-bottom:110px}
    .wrap{max-width:860px;margin:0 auto;padding:18px}
    .progress{height:8px;background:#eceff3;border-radius:999px;overflow:hidden;margin:8px 0 20px}.fill{width:35%;height:100%;background:var(--teal)}
    h1{
      font-family: var(--font-display);margin:0 0 8px;font-size:2rem}.sub{margin:0 0 20px;color:#71717a;font-weight:700}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .goal{padding:18px;border-radius:16px;border:2px solid #d7dde6;border-bottom:4px solid #aeb8c4;background:var(--bg-deep);cursor:pointer;font-weight:800;text-align:left}
    .goal small{display:block;color:#6b7280;font-weight:700}.goal.selected{border-color:var(--blue);border-bottom-color:#1596cf;color:var(--blue);box-shadow:0 0 0 3px rgba(28,176,246,.15)}
    .bar{position:fixed;left:0;right:0;bottom:0;border-top:1px solid #e5e7eb;background:var(--bg-deep);padding:16px;display:flex;justify-content:flex-end}
    .btn{min-width:180px;padding:14px 24px;border-radius:16px;border:2px solid #d1d5db;border-bottom:4px solid #a8afb8;background:#cfd4db;color:#fff;text-decoration:none;text-transform:uppercase;font-weight:900;pointer-events:none;display:inline-flex;justify-content:center}
    .btn.on{background:var(--teal);border-color:#55bf02;border-bottom-color:var(--teal-dark);pointer-events:auto}
    @media (max-width:760px){.grid{grid-template-columns:1fr}}
  
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body>
  <main class="wrap">
    <div class="progress"><div class="fill"></div></div>
    <h1>Set your daily coding goal</h1>
    <p class="sub">Choose the pace that fits your routine.</p>
    <section class="grid">
      <button class="goal" type="button">5 min/day<small>Warm up habit</small></button>
      <button class="goal" type="button">10 min/day<small>Steady progress</small></button>
      <button class="goal" type="button">15 min/day<small>Fast momentum</small></button>
      <button class="goal" type="button">20 min/day<small>Power learner</small></button>
    </section>
  </main>
  <footer class="bar"><a id="continue" class="btn" href="quiz.html" aria-disabled="true">Continue</a></footer>
  <script>
    const goals=document.querySelectorAll('.goal');const btn=document.getElementById('continue');
    goals.forEach(g=>g.addEventListener('click',()=>{goals.forEach(x=>x.classList.remove('selected'));g.classList.add('selected');btn.classList.add('on');btn.setAttribute('aria-disabled','false');}));
  </script>
</body>
</html>
