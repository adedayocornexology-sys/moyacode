<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoyaCode | Loading Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --c-teal:#00E5A0;--c-teal-dim:rgba(0,229,160,0.15);--c-teal-faint:rgba(0,229,160,0.07);
      --c-blue:#60A5FA;
      --bg-0:#030712;--bg-1:#060D1F;--bg-2:#0A1628;
      --glass:rgba(10,22,40,0.6);--glass-border:rgba(255,255,255,0.07);--glass-hi:rgba(255,255,255,0.12);
      --t-100:#F8FAFF;--t-200:#CBD5F0;--t-400:#7A8FAD;--t-600:#3D506A;
      --f-display:'Bricolage Grotesque',sans-serif;--f-body:'Space Grotesk',sans-serif;
      --spring:cubic-bezier(0.34,1.4,0.64,1);--ease:cubic-bezier(0.4,0,0.2,1);
      --dur-slow:400ms;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--f-body);background:var(--bg-0);color:var(--t-100);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;-webkit-font-smoothing:antialiased}
    .bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(120px);will-change:transform}
    .orb-1{width:900px;height:900px;background:radial-gradient(circle,rgba(0,229,160,0.18) 0%,transparent 65%);top:-30%;left:-20%;animation:da 25s ease-in-out infinite}
    .orb-2{width:700px;height:700px;background:radial-gradient(circle,rgba(96,165,250,0.14) 0%,transparent 65%);top:10%;right:-15%;animation:db 30s ease-in-out infinite}
    .orb-3{width:600px;height:600px;background:radial-gradient(circle,rgba(251,113,133,0.09) 0%,transparent 65%);bottom:0;left:25%;animation:dc 22s ease-in-out infinite}
    @keyframes da{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(80px,-60px) scale(1.1)}70%{transform:translate(-30px,50px) scale(.92)}}
    @keyframes db{0%,100%{transform:translate(0,0)}50%{transform:translate(-100px,80px) scale(1.08)}}
    @keyframes dc{0%,100%{transform:translate(0,0)}60%{transform:translate(60px,-40px) scale(1.05)}}
    .nav-back{position:fixed;top:20px;left:20px;z-index:100;display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:999px;background:rgba(6,13,31,0.8);border:1px solid var(--glass-hi);color:var(--t-200);font-size:.875rem;font-weight:600;text-decoration:none;backdrop-filter:blur(16px);transition:background 150ms var(--ease),color 150ms var(--ease)}
    .nav-back:hover{background:rgba(10,22,40,0.95);color:var(--t-100)}
    .loading-wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;gap:32px;width:min(560px,90vw);animation:fadeIn .6s var(--spring) both}
    @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .bot-zone{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center}
    .spin-ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:var(--c-teal);border-right-color:rgba(0,229,160,0.3);animation:spin 1.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .pulse-a{position:absolute;inset:10px;border-radius:50%;border:1px solid rgba(0,229,160,0.15);animation:pulse 2.4s ease-in-out infinite}
    .pulse-b{position:absolute;inset:20px;border-radius:50%;border:1px solid rgba(0,229,160,0.08);animation:pulse 2.4s ease-in-out .5s infinite}
    @keyframes pulse{0%,100%{transform:scale(.9);opacity:.4}50%{transform:scale(1.06);opacity:1}}
    .bot-avatar{width:120px;height:120px;border-radius:24px;background:var(--bg-2);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;box-shadow:0 0 40px rgba(0,229,160,0.1),0 8px 32px rgba(0,0,0,0.5);animation:float 3.2s ease-in-out infinite}
    .bot-avatar::after{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--glass-hi),transparent)}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    .loading-title{font-family:var(--f-display);font-size:clamp(1.4rem,3vw,1.9rem);font-weight:800;letter-spacing:-.03em;line-height:1.1;color:var(--t-100);animation:fadeIn .6s var(--spring) .2s both}
    .loading-tip{color:var(--t-400);font-size:.95rem;line-height:1.65;max-width:400px;animation:fadeIn .6s var(--spring) .35s both}
    .loading-tip strong{color:var(--c-teal);font-weight:600}
    .dots{display:flex;gap:8px;justify-content:center;animation:fadeIn .6s var(--spring) .5s both}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--glass-border)}
    .dot:nth-child(1){animation:dot-pulse 1.2s ease-in-out 0s infinite}
    .dot:nth-child(2){animation:dot-pulse 1.2s ease-in-out .2s infinite}
    .dot:nth-child(3){animation:dot-pulse 1.2s ease-in-out .4s infinite}
    @keyframes dot-pulse{0%,100%{background:var(--glass-border);transform:scale(1)}50%{background:var(--c-teal);transform:scale(1.3)}}
    .quest-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:999px;background:var(--c-teal-faint);border:1px solid rgba(0,229,160,0.2);color:var(--c-teal);font-size:.8rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;animation:fadeIn .6s var(--spring) .1s both}
  </style>
</head>
<body>
<div class="bg-canvas" aria-hidden="true"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<a class="nav-back" href="selection.html" aria-label="Back to quest selection">← Back</a>
<main class="loading-wrap" aria-live="polite" aria-label="Loading your lesson">
  <div class="quest-badge" id="quest-badge">Loading...</div>
  <div class="bot-zone" aria-hidden="true">
    <div class="spin-ring"></div><div class="pulse-a"></div><div class="pulse-b"></div>
    <div class="bot-avatar">
      <svg width="72" height="72" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MoyaBot preparing lesson">
        <rect x="68" y="70" width="124" height="96" rx="24" fill="#ffffff" stroke="#c9e2f5" stroke-width="8"/>
        <circle cx="108" cy="114" r="11" fill="#60A5FA"/><circle cx="152" cy="114" r="11" fill="#60A5FA"/>
        <rect x="102" y="136" width="56" height="10" rx="5" fill="#00E5A0"/>
        <line x1="130" y1="70" x2="130" y2="46" stroke="#c9e2f5" stroke-width="8"/><circle cx="130" cy="40" r="8" fill="#00E5A0"/>
      </svg>
    </div>
  </div>
  <h1 class="loading-title">MoyaBot is preparing<br/>your Lesson...</h1>
  <p class="loading-tip" id="tip-text"><strong>Tip:</strong> Every great developer started exactly where you are right now.</p>
  <div class="dots" aria-hidden="true"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</main>
<script>
  const tips = [
    "Every great developer started exactly where you are right now.",
    "Writing code is just telling a story the computer can understand.",
    "The best way to learn coding is to build something you care about.",
    "Bugs are just puzzles waiting to be solved — you have got this.",
    "One lesson at a time. Consistency beats intensity every time.",
    "The developers you admire were once beginners too.",
  ];
  const classLabels = {
    jss1: 'JSS1 · Scratch Basics', jss2: 'JSS2 · Advanced Scratch', jss3: 'JSS3 · Intro to HTML',
    ss1: 'SS1 · Advanced HTML', ss2: 'SS2 · CSS Styling', ss3: 'SS3 · JavaScript Logic',
  };
  const params = new URLSearchParams(window.location.search);
  const selectedClass = (params.get('class') || 'jss1').toLowerCase();
  const returnTo = params.get('returnTo') || 'selection.html';
  document.getElementById('quest-badge').textContent = classLabels[selectedClass] || selectedClass.toUpperCase();
  const tipEl = document.getElementById('tip-text');
  const tip = tips[Math.floor(Math.random() * tips.length)];
  tipEl.innerHTML = '<strong>Tip:</strong> ' + tip;
  setTimeout(function() {
    window.location.href = 'lesson.html?class=' + encodeURIComponent(selectedClass) + '&returnTo=' + encodeURIComponent(returnTo);
  }, 2800);
</script>
</body>
</html>
