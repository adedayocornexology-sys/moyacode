<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoyaCode | Lesson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--f-body);
      background: var(--bg-0);
      color: var(--t-100);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(120px); will-change: transform; }
    .orb-1 { width: 800px; height: 800px; background: radial-gradient(circle, rgba(0,229,160,0.16) 0%, transparent 65%); top: -25%; left: -15%; animation: da 25s ease-in-out infinite; }
    .orb-2 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(96,165,250,0.12) 0%, transparent 65%); top: 10%; right: -10%; animation: db 30s ease-in-out infinite; }
    .orb-3 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(251,113,133,0.08) 0%, transparent 65%); bottom: 5%; left: 20%; animation: dc 22s ease-in-out infinite; }
    @keyframes da { 0%,100%{transform:translate(0,0) scale(1)} 40%{transform:translate(60px,-50px) scale(1.08)} 70%{transform:translate(-20px,40px) scale(.94)} }
    @keyframes db { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-80px,60px) scale(1.06)} }
    @keyframes dc { 0%,100%{transform:translate(0,0)} 60%{transform:translate(50px,-30px) scale(1.04)} }
    .lesson-shell {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 272px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 272px;
      background: rgba(6,13,31,0.88);
      backdrop-filter: blur(24px) saturate(160%);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      z-index: 200;
      overflow-y: auto;
    }
    .sb-logo-row {
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sb-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-family: var(--f-display);
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--t-100);
      letter-spacing: -0.03em;
    }
    .logo-mark {
      width: 26px; height: 26px;
      border-radius: var(--r-sm);
      background: var(--c-teal);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sb-course-info {
      padding: 16px 20px;
      border-bottom: 1px solid var(--glass-border);
    }
    .sb-track-label {
      font-size: .68rem;
      font-weight: 700;
      color: var(--t-600);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 5px;
    }
    .sb-course-title {
      font-family: var(--f-display);
      font-size: 1rem;
      font-weight: 700;
      color: var(--t-100);
      margin-bottom: 12px;
      line-height: 1.25;
    }
    .sb-prog-label {
      display: flex;
      justify-content: space-between;
      font-size: .68rem;
      font-weight: 600;
      color: var(--t-600);
      margin-bottom: 6px;
    }
    .sb-prog-label span:last-child { color: var(--c-teal); }
    .sb-prog-track {
      height: 5px;
      border-radius: 999px;
      background: var(--glass-border);
      overflow: hidden;
    }
    .sb-prog-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--c-teal), var(--c-blue));
      transition: width .5s var(--ease);
    }
    .skip-shortcut {
      display: none;
      margin: 12px 20px 0;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: var(--r-md);
      background: var(--c-teal-faint);
      border: 1px solid rgba(0,229,160,0.2);
      color: var(--c-teal);
      font-size: .75rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: background var(--dur-fast) var(--ease);
    }
    .skip-shortcut:hover { background: var(--c-teal-dim); }
    .skip-shortcut.visible { display: flex; }
    .sb-steps { flex: 1; padding: 8px 0; }
    .sb-step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 20px;
      cursor: pointer;
      position: relative;
      transition: background var(--dur-fast) var(--ease);
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
    }
    .sb-step:hover { background: rgba(255,255,255,0.03); }
    .sb-step.active { background: var(--c-teal-faint); }
    .sb-step.active::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--c-teal);
      border-radius: 0 2px 2px 0;
    }
    .step-num {
      width: 28px; height: 28px;
      border-radius: var(--r-sm);
      background: var(--glass-border);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--f-mono);
      font-size: .72rem;
      font-weight: 700;
      color: var(--t-600);
      flex-shrink: 0;
      transition: all var(--dur-fast) var(--ease);
      position: relative;
    }
    .sb-step.done .step-num {
      background: var(--c-teal-dim);
      color: var(--c-teal);
    }
    .sb-step.active .step-num {
      background: var(--c-teal);
      color: var(--bg-0);
      font-weight: 800;
    }
    .sb-step.done .step-num::after {
      content: '✓';
      position: absolute;
      font-size: .65rem;
    }
    .sb-step.done .step-num span { display: none; }
    .step-info { flex: 1; min-width: 0; }
    .step-title-text {
      font-size: .82rem;
      font-weight: 600;
      color: var(--t-400);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color var(--dur-fast) var(--ease);
    }
    .sb-step.active .step-title-text { color: var(--t-100); font-weight: 700; }
    .sb-step.done .step-title-text  { color: var(--t-600); }
    .step-mins {
      font-size: .65rem;
      color: var(--t-700);
      font-weight: 500;
      margin-top: 2px;
    }
    .sb-step.active .step-mins { color: var(--t-600); }
    .sb-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--glass-border);
    }
    .xp-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 13px;
      border-radius: var(--r-md);
      background: var(--c-teal-faint);
      border: 1px solid rgba(0,229,160,0.15);
    }
    .xp-emoji { font-size: 14px; flex-shrink: 0; }
    .xp-info { flex: 1; }
    .xp-label { font-size: .65rem; font-weight: 700; color: var(--t-600); text-transform: uppercase; letter-spacing: .07em; }
    .xp-val { font-family: var(--f-display); font-size: .92rem; font-weight: 800; color: var(--c-teal); }
    .xp-bonus { font-size: .65rem; font-weight: 700; color: var(--c-teal); opacity: .75; }
    .lesson-main {
      margin-left: 0;
      padding: 40px 52px 120px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      width: 100%;
      min-width: 0;
      max-width: 980px;
    }
    #step-content {
      width: 100%;
      max-width: 760px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .lesson-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--c-teal);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .eyebrow::before {
      content: '';
      display: block;
      width: 18px; height: 1.5px;
      background: var(--c-teal);
      border-radius: 999px;
    }
    .topbar-actions { display: flex; gap: 8px; }
    .icon-btn {
      width: 36px; height: 36px;
      border-radius: var(--r-md);
      background: var(--glass);
      border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 13px;
      color: var(--t-400);
      transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
      text-decoration: none;
    }
    .icon-btn:hover { background: var(--glass-hi); color: var(--t-100); }
    .lesson-h1 {
      font-family: var(--f-display);
      font-size: clamp(1.7rem, 3.5vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1.05;
      color: var(--t-100);
      margin-bottom: 10px;
      animation: step-fade-in var(--dur-slow) var(--spring) both;
    }
    .lesson-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .meta-pill {
      padding: 4px 11px;
      border-radius: 999px;
      background: var(--glass-border);
      border: 1px solid rgba(255,255,255,0.06);
      font-size: .7rem;
      font-weight: 600;
      color: var(--t-400);
    }
    .meta-pill.teal {
      background: var(--c-teal-faint);
      border-color: rgba(0,229,160,0.2);
      color: var(--c-teal);
    }
    .content-divider {
      height: 1px;
      background: linear-gradient(90deg, var(--glass-hi), transparent 80%);
    }
    .content-section { display: flex; flex-direction: column; gap: 16px; }
    .section-eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .68rem;
      font-weight: 700;
      color: var(--t-600);
      text-transform: uppercase;
      letter-spacing: .1em;
    }
    .section-eyebrow::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--glass-border);
    }
    .lesson-prose {
      color: var(--t-200);
      font-size: .97rem;
      line-height: 1.82;
      font-weight: 400;
    }
    .lesson-prose strong { color: var(--t-100); font-weight: 700; }
    .callout {
      border-radius: var(--r-lg);
      padding: 14px 18px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      position: relative;
      overflow: hidden;
    }
    .callout::after {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }
    .callout.info    { background: var(--c-teal-dim);  border: 1px solid rgba(0,229,160,0.18); }
    .callout.warning { background: var(--c-amber-dim); border: 1px solid rgba(252,211,77,0.16); }
    .callout.tip     { background: var(--c-blue-dim);  border: 1px solid rgba(96,165,250,0.16); }
    .callout-icon    { font-size: 15px; flex-shrink: 0; margin-top: 1px; line-height: 1.6; }
    .callout-body    { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .callout-title   {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 2px;
    }
    .callout.info    .callout-title { color: var(--c-teal); }
    .callout.warning .callout-title { color: var(--c-amber); }
    .callout.tip     .callout-title { color: var(--c-blue); }
    .callout-text {
      font-size: .88rem;
      color: var(--t-200);
      line-height: 1.65;
    }
    .code-card {
      background: var(--bg-0);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-lg);
      overflow: hidden;
    }
    .code-bar {
      background: var(--bg-2);
      padding: 9px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .code-dots { display: flex; gap: 5px; }
    .code-dot  { width: 8px; height: 8px; border-radius: 50%; }
    .dot-r { background: #FF5F57; }
    .dot-a { background: #FFBD2E; }
    .dot-g { background: #28C840; }
    .code-lang  { font-family: var(--f-mono); font-size: .65rem; color: var(--t-600); font-weight: 500; }
    .copy-btn {
      font-family: var(--f-mono);
      font-size: .65rem;
      color: var(--t-400);
      background: var(--glass-border);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 5px;
      padding: 3px 9px;
      cursor: pointer;
      transition: color var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease);
    }
    .copy-btn:hover { color: var(--c-teal); background: var(--c-teal-faint); }
    .code-body {
      padding: 18px 20px;
      font-family: var(--f-mono);
      font-size: .8rem;
      line-height: 1.95;
      color: var(--t-400);
      overflow-x: auto;
      white-space: pre;
    }
    .bottom-nav {
      position: fixed;
      left: 272px;
      right: 0;
      bottom: 0;
      z-index: 300;
      background: rgba(6,13,31,0.92);
      backdrop-filter: blur(24px) saturate(180%);
      border-top: 1px solid var(--glass-border);
      padding: 14px 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .bnav-dots { display: flex; gap: 6px; align-items: center; }
    .bnav-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--glass-border);
      transition: background var(--dur-mid) var(--ease), box-shadow var(--dur-mid) var(--ease);
    }
    .bnav-dot.done   { background: var(--c-teal); }
    .bnav-dot.active { background: var(--c-teal); box-shadow: 0 0 0 3px var(--c-teal-faint); }
    .bnav-label { font-size: .78rem; font-weight: 600; color: var(--t-600); margin-left: 12px; }
    .bnav-actions { display: flex; gap: 10px; align-items: center; }
    .btn-back {
      padding: 10px 20px;
      border-radius: var(--r-lg);
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--t-400);
      font-family: var(--f-body);
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease);
    }
    .btn-back:hover { border-color: var(--glass-hi); color: var(--t-100); background: var(--glass); }
    .btn-next {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      border-radius: var(--r-lg);
      background: var(--c-teal);
      color: var(--bg-0);
      font-family: var(--f-body);
      font-size: .88rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 28px rgba(0,229,160,0.28), 0 4px 12px rgba(0,229,160,0.15);
      transition: transform var(--dur-fast) var(--spring), box-shadow var(--dur-mid) var(--ease);
    }
    .btn-next:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(0,229,160,0.45), 0 8px 20px rgba(0,229,160,0.25); }
    .btn-next:active { transform: translateY(0); }
    .btn-next .arr { transition: transform var(--dur-fast) var(--spring); }
    .btn-next:hover .arr { transform: translateX(4px); }
    .btn-next.quest-mode {
      background: linear-gradient(135deg, var(--c-teal), var(--c-blue));
      box-shadow: 0 0 32px rgba(0,229,160,0.35), 0 0 32px rgba(96,165,250,0.2);
    }
    @keyframes step-fade-in {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .step-animated { animation: step-fade-in var(--dur-slow) var(--spring) both; }
    .step-animated-2 { animation: step-fade-in var(--dur-slow) var(--spring) 80ms both; }
    .step-animated-3 { animation: step-fade-in var(--dur-slow) var(--spring) 160ms both; }
    .step-animated-4 { animation: step-fade-in var(--dur-slow) var(--spring) 240ms both; }
    .step-animated-5 { animation: step-fade-in var(--dur-slow) var(--spring) 320ms both; }
    @media (max-width: 860px) {
      .sidebar { transform: translateX(-100%); transition: transform var(--dur-mid) var(--ease); }
      .sidebar.open { transform: translateX(0); }
      .lesson-main { margin-left: 0; padding: 24px 20px 120px; max-width: 100%; width: 100%; }
      .bottom-nav { left: 0; padding: 14px 20px; }
      .mob-menu-btn { display: flex !important; }
    }
    .sidebar-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:499; }
    .sidebar-backdrop.visible { display:block; }
    .mob-menu-btn {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--r-md);
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--t-400);
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="bg-canvas" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="lesson-shell">
  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Lesson navigation">
    <div class="sb-logo-row">
      <a href="index.html" class="sb-logo" aria-label="MoyaCode home">
        <div class="logo-mark" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M8 6l4-4 4 4M8 18l4 4 4-4M3 12h18" stroke="#030712" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        MoyaCode
      </a>
      <button class="icon-btn" id="sidebar-close" aria-label="Close menu" style="display:none">✕</button>
    </div>
    <div class="sb-course-info">
      <div class="sb-track-label" id="sb-track-label">Loading...</div>
      <div class="sb-course-title" id="sb-course-title">Loading...</div>
      <div class="sb-prog-label">
        <span>Progress</span>
        <span id="sb-prog-text">Step 1 of 5</span>
      </div>
      <div class="sb-prog-track">
        <div class="sb-prog-fill" id="sb-prog-fill" style="width:0%"></div>
      </div>
    </div>
    <button class="skip-shortcut" id="skip-shortcut" aria-label="Skip to quiz" onclick="launchQuest()">
      ⚡ Jump straight to Quiz
    </button>
    <div class="sb-steps" id="sb-steps" role="list"></div>
    <div class="sb-footer">
      <div class="xp-row">
        <span class="xp-emoji" aria-hidden="true">⚡</span>
        <div class="xp-info">
          <div class="xp-label">Your XP</div>
          <div class="xp-val" id="xp-val">0 pts</div>
        </div>
        <div class="xp-bonus" id="xp-bonus">+50 on quiz</div>
      </div>
    </div>
  </aside>
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <main class="lesson-main" id="lesson-main" role="main">
    <div class="lesson-topbar">
      <div class="eyebrow" id="step-eyebrow">Step 1 of 5</div>
      <div class="topbar-actions">
        <button class="mob-menu-btn" id="mob-menu-btn" aria-label="Open lesson menu">☰ Steps</button>
        <a class="icon-btn" href="#" id="ask-bot-btn" title="Ask MoyaBot" aria-label="Ask MoyaBot">🤖</a>
        <a class="icon-btn" href="selection.html" title="Back to quests" aria-label="Back to quest selection">📚</a>
      </div>
    </div>
    <div class="lesson-header">
      <h1 class="lesson-h1" id="step-title">Loading...</h1>
      <div class="lesson-meta" id="step-meta"></div>
    </div>
    <div class="content-divider"></div>
    <div id="step-content" role="article" aria-live="polite"></div>
    <div style="height:40px" aria-hidden="true"></div>
  </main>
</div>
<nav class="bottom-nav" aria-label="Step navigation">
  <div style="display:flex;align-items:center">
    <div class="bnav-dots" id="bnav-dots" aria-hidden="true"></div>
    <span class="bnav-label" id="bnav-label">Step 1 of 5</span>
  </div>
  <div class="bnav-actions">
    <button class="btn-back" id="btn-back" onclick="prevStep()">← Back</button>
    <button class="btn-next" id="btn-next" onclick="nextStep()">
      Next Step <span class="arr" aria-hidden="true">→</span>
    </button>
  </div>
</nav>
<script src="lessons.js"></script>
<script>
const LESSON_SEEN_KEY = 'moyacode_lesson_seen_';
const XP_KEY = 'moyacode_xp';
const state = { classKey:'', returnTo:'selection.html', lesson:null, stepIndex:0, totalSteps:0, seenBefore:false };

function openSidebar() {
  el('sidebar').classList.add('open');
  el('sidebar-close').style.display = 'flex';
  const back = el('sidebar-backdrop');
  if (back) back.classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function closeSidebar() {
  el('sidebar').classList.remove('open');
  el('sidebar-close').style.display = 'none';
  const back = el('sidebar-backdrop');
  if (back) back.classList.remove('visible');
  document.body.style.overflow = '';
}

function init() {
  const params = new URLSearchParams(window.location.search);
  const classKey = (params.get('class') || 'jss3').toLowerCase();
  const returnTo = params.get('returnTo') || 'selection.html';
  if (!LESSON_BANKS[classKey]) { window.location.href = 'selection.html'; return; }
  state.classKey = classKey; state.returnTo = returnTo; state.lesson = LESSON_BANKS[classKey];
  state.totalSteps = state.lesson.steps.length;
  state.seenBefore = !!localStorage.getItem(LESSON_SEEN_KEY + classKey);
  document.title = 'MoyaCode | ' + state.lesson.title;
  el('sb-track-label').textContent = 'Track · ' + state.lesson.classLabel;
  el('sb-course-title').textContent = state.lesson.title;
  const savedXP = parseInt(localStorage.getItem(XP_KEY) || '0', 10);
  el('xp-val').textContent = savedXP + ' pts';
  el('xp-bonus').textContent = '+' + state.lesson.totalXP + ' on quiz';
  el('ask-bot-btn').href = 'quiz.html?class=' + classKey;
  if (state.seenBefore) el('skip-shortcut').classList.add('visible');
  buildSidebarSteps(); buildNavDots(); renderStep(0);
  el('mob-menu-btn').addEventListener('click', openSidebar);
  el('sidebar-close').addEventListener('click', closeSidebar);
  const back = el('sidebar-backdrop');
  if (back) back.addEventListener('click', closeSidebar);
}
function buildSidebarSteps() {
  const container = el('sb-steps'); container.innerHTML = '';
  state.lesson.steps.forEach((step, i) => {
    const btn = document.createElement('button');
    btn.className = 'sb-step'; btn.role = 'listitem';
    btn.setAttribute('aria-label', 'Go to step ' + (i + 1) + ': ' + step.title);
    btn.innerHTML = `<div class="step-num"><span>${i + 1}</span></div><div class="step-info"><div class="step-title-text">${escHtml(step.title)}</div><div class="step-mins">${step.readMins} min read</div></div>`;
    btn.addEventListener('click', () => { goToStep(i); closeSidebar(); });
    container.appendChild(btn);
  });
}
function buildNavDots() {
  const container = el('bnav-dots'); container.innerHTML = '';
  state.lesson.steps.forEach((_, i) => {
    const dot = document.createElement('div'); dot.className = 'bnav-dot'; dot.id = 'bnav-dot-' + i; container.appendChild(dot);
  });
}
function renderStep(index) {
  const step = state.lesson.steps[index];
  const isFirst = index === 0; const isLast = index === state.lesson.steps.length - 1;
  const pct = Math.round(((index + 1) / state.lesson.steps.length) * 100);
  el('step-eyebrow').textContent = 'Step ' + (index + 1) + ' of ' + state.totalSteps;
  el('step-title').textContent = step.title; el('step-title').className = 'lesson-h1 step-animated';
  el('step-meta').innerHTML = `<span class="meta-pill teal">${step.readMins} min read</span><span class="meta-pill">${escHtml(state.lesson.classLabel)}</span><span class="meta-pill">${escHtml(state.lesson.title)}</span>`;
  el('sb-prog-fill').style.width = pct + '%'; el('sb-prog-text').textContent = 'Step ' + (index + 1) + ' of ' + state.totalSteps;
  el('bnav-label').textContent = 'Step ' + (index + 1) + ' of ' + state.totalSteps;
  document.querySelectorAll('.sb-step').forEach((btn, i) => { btn.classList.remove('active', 'done'); if (i < index) btn.classList.add('done'); if (i === index) btn.classList.add('active'); });
  document.querySelectorAll('.bnav-dot').forEach((dot, i) => { dot.classList.remove('active', 'done'); if (i < index) dot.classList.add('done'); if (i === index) dot.classList.add('active'); });
  el('btn-back').disabled = isFirst; el('btn-back').style.opacity = isFirst ? '0.35' : '1'; el('btn-back').style.cursor = isFirst ? 'not-allowed' : 'pointer';
  const nextBtn = el('btn-next');
  if (isLast) { nextBtn.innerHTML = '⚡ Start Quest'; nextBtn.classList.add('quest-mode'); }
  else { nextBtn.innerHTML = 'Next Step <span class="arr" aria-hidden="true">→</span>'; nextBtn.classList.remove('quest-mode'); }
  el('step-content').innerHTML = ''; renderContentBlocks(step, index);
  el('lesson-main').scrollTop = 0; window.scrollTo({ top: 0, behavior: 'smooth' });
}
function renderContentBlocks(step, stepIndex) {
  const container = el('step-content'); let delayClass = 1;
  const sectionLabel = document.createElement('div'); sectionLabel.className = 'section-eyebrow step-animated';
  sectionLabel.textContent = stepIndex === state.totalSteps - 1 ? 'Final Step' : 'Reading'; container.appendChild(sectionLabel);
  const sections = Array.isArray(step.sections) ? step.sections : [];
  if (sections.length === 0) {
    const empty = document.createElement('p');
    empty.className = 'lesson-prose step-animated';
    empty.textContent = 'Lesson content for this topic is coming soon.';
    container.appendChild(empty);
  }
  sections.forEach((section) => {
    const animClass = 'step-animated-' + Math.min(delayClass++, 5); let node;
    if (section.type === 'prose') { node = document.createElement('p'); node.className = 'lesson-prose ' + animClass; node.textContent = section.text; }
    else if (section.type === 'callout') {
      node = document.createElement('div'); node.className = 'callout ' + section.variant + ' ' + animClass;
      const icon = section.variant === 'info' ? '💡' : section.variant === 'warning' ? '⚠️' : '🤖';
      node.innerHTML = `<span class="callout-icon" aria-hidden="true">${icon}</span><div class="callout-body"><div class="callout-title">${escHtml(section.title)}</div><div class="callout-text">${escHtml(section.text)}</div></div>`;
    }
    if (node) container.appendChild(node);
  });
  if (step.codeBlock) {
    const animClass = 'step-animated-' + Math.min(delayClass++, 5);
    const codeCard = document.createElement('div'); codeCard.className = 'code-card ' + animClass;
    codeCard.innerHTML = `<div class="code-bar"><div class="code-dots"><div class="code-dot dot-r"></div><div class="code-dot dot-a"></div><div class="code-dot dot-g"></div></div><span class="code-lang">${escHtml(step.codeBlock.label)}</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><div class="code-body" aria-label="${escHtml(step.codeBlock.label)} code example">${step.codeBlock.code}</div>`;
    container.appendChild(codeCard);
  }
}
function goToStep(index) { if (index < 0 || index >= state.totalSteps) return; state.stepIndex = index; renderStep(index); }
function nextStep() { const isLast = state.stepIndex === state.totalSteps - 1; if (isLast) { launchQuest(); return; } goToStep(state.stepIndex + 1); }
function prevStep() { if (state.stepIndex === 0) return; goToStep(state.stepIndex - 1); }
function launchQuest() {
  localStorage.setItem(LESSON_SEEN_KEY + state.classKey, 'true');
  window.location.href = 'quiz.html?class=' + encodeURIComponent(state.classKey) + '&returnTo=' + encodeURIComponent(state.returnTo);
}
function copyCode(btn) {
  const codeBody = btn.closest('.code-card').querySelector('.code-body');
  const text = codeBody.innerText || codeBody.textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!'; btn.style.color = 'var(--c-teal)';
    setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = ''; }, 2000);
  }).catch(() => { btn.textContent = 'Copied'; setTimeout(() => { btn.textContent = 'Copy'; }, 2000); });
}
function el(id) { return document.getElementById(id); }
function escHtml(str) {
  return String(str || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
init();
</script>
</body>
</html>
