<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoyaCode | Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --c-teal:#00E5A0;--c-teal-mid:#00B87A;--c-teal-dim:rgba(0,229,160,0.15);--c-teal-faint:rgba(0,229,160,0.07);
      --c-blue:#60A5FA;--c-blue-dim:rgba(96,165,250,0.12);
      --c-coral:#FB7185;--c-coral-dim:rgba(251,113,133,0.12);
      --c-amber:#FCD34D;--c-amber-dim:rgba(252,211,77,0.12);
      --bg-0:#030712;--bg-1:#060D1F;--bg-2:#0A1628;--bg-3:#0F1F38;
      --glass:rgba(10,22,40,0.6);--glass-border:rgba(255,255,255,0.07);--glass-hi:rgba(255,255,255,0.12);
      --t-100:#F8FAFF;--t-200:#CBD5F0;--t-400:#7A8FAD;--t-600:#3D506A;--t-700:#243350;
      --f-display:'Bricolage Grotesque',sans-serif;--f-body:'Space Grotesk',sans-serif;
      --ease:cubic-bezier(0.4,0,0.2,1);--spring:cubic-bezier(0.34,1.4,0.64,1);
      --dur-fast:150ms;--dur-mid:250ms;--dur-slow:400ms;
      --sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:24px;--sp-8:32px;--sp-10:40px;
      --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;--r-2xl:24px;--r-3xl:32px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--f-body);background:var(--bg-0);color:var(--t-100);overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}

    /* Orbs */
    .bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(120px);will-change:transform}
    .orb-1{width:900px;height:900px;background:radial-gradient(circle,rgba(0,229,160,0.18) 0%,transparent 65%);top:-30%;left:-20%;animation:da 25s ease-in-out infinite}
    .orb-2{width:700px;height:700px;background:radial-gradient(circle,rgba(96,165,250,0.14) 0%,transparent 65%);top:10%;right:-15%;animation:db 30s ease-in-out infinite}
    .orb-3{width:600px;height:600px;background:radial-gradient(circle,rgba(251,113,133,0.09) 0%,transparent 65%);bottom:0;left:25%;animation:dc 22s ease-in-out infinite}
    @keyframes da{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(80px,-60px) scale(1.1)}70%{transform:translate(-30px,50px) scale(.92)}}
    @keyframes db{0%,100%{transform:translate(0,0)}50%{transform:translate(-100px,80px) scale(1.08)}}
    @keyframes dc{0%,100%{transform:translate(0,0)}60%{transform:translate(60px,-40px) scale(1.05)}}

    /* Nav */
    nav{position:fixed;top:16px;left:0;right:0;z-index:900;pointer-events:none}
    .nav-inner{width:min(1160px,90vw);margin:0 auto;background:rgba(6,13,31,0.75);backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--glass-hi);border-radius:var(--r-2xl);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;pointer-events:all;box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 0 0 1px rgba(255,255,255,0.03)}
    .logo{display:flex;align-items:center;gap:var(--sp-2);text-decoration:none;font-family:var(--f-display);font-size:1.15rem;font-weight:800;color:var(--t-100);letter-spacing:-0.03em}
    .logo-mark{width:28px;height:28px;border-radius:var(--r-sm);background:var(--c-teal);display:flex;align-items:center;justify-content:center}
    .nav-back{padding:8px 16px;border-radius:var(--r-md);background:var(--glass);border:1px solid var(--glass-border);color:var(--t-400);font-size:0.875rem;font-weight:600;text-decoration:none;transition:color var(--dur-fast) var(--ease),background var(--dur-fast) var(--ease)}
    .nav-back:hover{color:var(--t-100);background:var(--glass-hi)}

    /* Main shell */
    .shell{flex:1;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;padding:100px 20px 40px}

    /* Welcome card */
    .welcome-card{width:min(640px,90vw);background:var(--glass);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border:1px solid var(--glass-border);border-radius:var(--r-3xl);padding:var(--sp-10) var(--sp-8);display:flex;flex-direction:column;align-items:center;text-align:center;gap:var(--sp-6);position:relative;overflow:hidden;box-shadow:0 0 80px rgba(0,229,160,0.04),0 32px 80px rgba(0,0,0,0.4);animation:cardIn var(--dur-slow) var(--spring) both}
    .welcome-card::after{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,var(--glass-hi),transparent)}
    @keyframes cardIn{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}

    /* Bot avatar */
    .bot-wrap{position:relative;animation:cardIn var(--dur-slow) var(--spring) 80ms both}
    .bot-avatar{width:120px;height:120px;border-radius:var(--r-2xl);background:var(--bg-2);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;box-shadow:0 0 40px rgba(0,229,160,0.08),0 8px 32px rgba(0,0,0,0.4)}
    .bot-avatar::after{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--glass-hi),transparent)}

    /* Pulse ring around avatar */
    .pulse-ring{position:absolute;inset:-12px;border-radius:50%;border:1.5px solid rgba(0,229,160,0.2);animation:pulse-expand 2.5s ease-in-out infinite}
    .pulse-ring-2{position:absolute;inset:-24px;border-radius:50%;border:1px solid rgba(0,229,160,0.1);animation:pulse-expand 2.5s ease-in-out 0.4s infinite}
    @keyframes pulse-expand{0%{transform:scale(0.88);opacity:0}50%{opacity:1}100%{transform:scale(1.08);opacity:0}}

    /* Pill badge */
    .pill-badge{display:inline-flex;align-items:center;gap:var(--sp-2);padding:6px 14px;border-radius:999px;background:var(--c-teal-faint);border:1px solid rgba(0,229,160,0.22);color:var(--c-teal);font-size:.75rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;animation:cardIn var(--dur-slow) var(--spring) 160ms both}
    .pill-dot{width:6px;height:6px;border-radius:50%;background:var(--c-teal);animation:blink 2s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}

    /* Heading */
    .welcome-h1{font-family:var(--f-display);font-size:clamp(2.2rem,5vw,3.2rem);font-weight:800;letter-spacing:-.04em;line-height:.96;color:var(--t-100);animation:cardIn var(--dur-slow) var(--spring) 200ms both}
    .welcome-h1 .em{color:var(--c-teal)}

    /* Sub */
    .welcome-sub{color:var(--t-400);font-size:1rem;line-height:1.7;max-width:420px;animation:cardIn var(--dur-slow) var(--spring) 260ms both}

    /* XP chips row */
    .chips{display:flex;justify-content:center;gap:var(--sp-3);flex-wrap:wrap;animation:cardIn var(--dur-slow) var(--spring) 320ms both}
    .chip{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r-md);background:var(--bg-2);border:1px solid var(--glass-border);font-size:.82rem;font-weight:600;color:var(--t-400)}
    .chip strong{color:var(--t-100)}

    /* CTA button */
    .cta-wrap{width:100%;animation:cardIn var(--dur-slow) var(--spring) 380ms both}
    .btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:var(--sp-2);width:100%;padding:15px 28px;border-radius:var(--r-lg);background:var(--c-teal);color:var(--bg-0);font-family:var(--f-body);font-weight:700;font-size:1rem;text-decoration:none;letter-spacing:.01em;box-shadow:0 0 36px rgba(0,229,160,.35),0 4px 12px rgba(0,229,160,.2);transition:transform var(--dur-fast) var(--spring),box-shadow var(--dur-mid) var(--ease)}
    .btn-primary:hover{transform:translateY(-3px);box-shadow:0 0 56px rgba(0,229,160,.5),0 8px 20px rgba(0,229,160,.3)}
    .btn-primary:active{transform:translateY(0)}
    .btn-arrow{transition:transform var(--dur-fast) var(--spring)}
    .btn-primary:hover .btn-arrow{transform:translateX(4px)}

    /* Skip link */
    .skip-link{font-size:.82rem;color:var(--t-600);font-weight:500;text-decoration:none;transition:color var(--dur-fast) var(--ease);animation:cardIn var(--dur-slow) var(--spring) 440ms both}
    .skip-link:hover{color:var(--t-400)}

    @media(max-width:480px){
      .welcome-card{padding:var(--sp-8) var(--sp-5)}
      .chips{gap:var(--sp-2)}
    }
  </style>
</head>
<body>

<div class="bg-canvas" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<nav role="navigation" aria-label="Main navigation">
  <div class="nav-inner">
    <a href="index.html" class="logo" aria-label="MoyaCode home">
      <div class="logo-mark" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M8 6l4-4 4 4M8 18l4 4 4-4M3 12h18" stroke="#030712" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      MoyaCode
    </a>
    <a href="index.html" class="nav-back">← Home</a>
  </div>
</nav>

<main class="shell">
  <div class="welcome-card">

    <!-- Bot avatar with pulse rings -->
    <div class="bot-wrap" aria-label="MoyaBot">
      <div class="pulse-ring" aria-hidden="true"></div>
      <div class="pulse-ring-2" aria-hidden="true"></div>
      <div class="bot-avatar">
        <svg width="72" height="72" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MoyaBot robot">
          <rect x="68" y="70" width="124" height="96" rx="24" fill="#ffffff" stroke="#c9e2f5" stroke-width="8"/>
          <circle cx="108" cy="114" r="11" fill="#60A5FA"/>
          <circle cx="152" cy="114" r="11" fill="#60A5FA"/>
          <rect x="102" y="136" width="56" height="10" rx="5" fill="#00E5A0"/>
          <line x1="130" y1="70" x2="130" y2="46" stroke="#c9e2f5" stroke-width="8"/>
          <circle cx="130" cy="40" r="8" fill="#00E5A0"/>
        </svg>
      </div>
    </div>

    <!-- Badge -->
    <div class="pill-badge">
      <div class="pill-dot" aria-hidden="true"></div>
      Welcome Hero
    </div>

    <!-- Heading -->
    <h1 class="welcome-h1">
      Hi there,<br/>
      I'm <span class="em">MoyaBot.</span>
    </h1>

    <!-- Sub -->
    <p class="welcome-sub">
      I'm here to guide your coding journey — from your first block of Scratch all the way to real JavaScript projects.
    </p>

    <!-- XP chips (populated by JS; hidden until data is ready) -->
    <div class="chips" aria-label="Your stats" id="statsRow" style="visibility:hidden">
      <div class="chip" id="chipStreak"><strong>🔥</strong> — streak</div>
      <div class="chip" id="chipXP"><strong>⚡</strong> — XP</div>
      <div class="chip" id="chipLevel"><strong>🏆</strong> Level —</div>
    </div>

    <!-- CTA -->
    <div class="cta-wrap">
      <a class="btn-primary" href="placement.html" id="mainCTA">
        Start Your Journey
        <span class="btn-arrow" aria-hidden="true">→</span>
      </a>
    </div>

    <!-- Skip for returning users -->
    <a class="skip-link" href="auth.html" id="secondaryCTA" aria-label="Sign in to your account">
      Already have an account? Sign in →
    </a>

  </div>
</main>

<script type="module">
import { getSession }        from './js/auth.js';
import { migrateLocalStorage, loadProgress, loadProfile } from './js/db.js';

const COURSE_ORDER = ['jss1','jss2','jss3','ss1','ss2','ss3'];

function calcXP() {
  return COURSE_ORDER.reduce((s, k) => {
    try { const p = JSON.parse(localStorage.getItem('moyacode_progress_' + k) || '{}'); return s + (p.xp || 0); } catch { return s; }
  }, 0);
}

function calcStreak() {
  try {
    const log = JSON.parse(localStorage.getItem('moyacode_session_log') || '[]');
    if (!log.length) return 0;
    const dates = [...new Set(log.map(e => (e.timestamp||'').slice(0,10)))].filter(Boolean).sort();
    const today = new Date().toISOString().slice(0,10);
    if (dates[dates.length-1] !== today) return 0;
    let streak = 1;
    for (let i = dates.length-1; i > 0; i--) {
      if ((new Date(dates[i]) - new Date(dates[i-1])) / 86400000 === 1) streak++; else break;
    }
    return streak;
  } catch { return 0; }
}

function calcLevel(xp) {
  if (xp < 100)  return 1;
  if (xp < 250)  return 2;
  if (xp < 450)  return 3;
  if (xp < 700)  return 4;
  if (xp < 1000) return 5;
  if (xp < 1400) return 6;
  if (xp < 1900) return 7;
  return 8;
}

function showStats() {
  const xp     = calcXP();
  const streak = calcStreak();
  const level  = calcLevel(xp);
  document.getElementById('chipStreak').innerHTML = `<strong>🔥</strong> ${streak} day streak`;
  document.getElementById('chipXP').innerHTML     = `<strong>⚡</strong> ${xp} XP`;
  document.getElementById('chipLevel').innerHTML  = `<strong>🏆</strong> Level ${level}`;
  document.getElementById('statsRow').style.visibility = 'visible';
}

(async () => {
  const session = await getSession();

  if (session) {
    // Migrate localStorage → Supabase once
    await migrateLocalStorage(session.user.id).catch(() => {});

    // Pull fresh data from DB to ensure stats are current
    const [profile, progressRows] = await Promise.all([
      loadProfile(session.user.id).catch(() => null),
      loadProgress(session.user.id).catch(() => []),
    ]);

    if (profile?.dream) localStorage.setItem('moyacode_dream', profile.dream);
    if (Array.isArray(progressRows)) {
      progressRows.forEach(row => {
        if (row.completed) {
          const key = 'moyacode_progress_' + row.class_key;
          const ex = JSON.parse(localStorage.getItem(key) || '{}');
          if (!ex.completed) {
            localStorage.setItem(key, JSON.stringify({ score: row.score||0, xp: row.xp||0, completed: true, updatedAt: row.updated_at }));
          }
        }
      });
    }

    // Route returning user with placement → home.html
    const hasPlacement = !!localStorage.getItem('moyacode_placement_course');
    if (hasPlacement) {
      window.location.replace('home.html');
      return;
    }

    // Logged in but no placement yet → push to placement
    const cta = document.getElementById('mainCTA');
    cta.href = 'placement.html';
    cta.innerHTML = 'Take Placement Test <span class="btn-arrow" aria-hidden="true">→</span>';

    const sec = document.getElementById('secondaryCTA');
    sec.style.display = 'none';
  }

  showStats();
})();
</script>
<script type="module" src="/js/assistant.js"></script>

</body>
</html>
