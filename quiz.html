<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoyaCode | Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="components.css" />
  <style>
    .quiz-grid { display:grid; grid-template-columns:7fr 5fr; gap:12px; }
    .progress-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--sp-4); color:var(--t-400); font-size:.85rem; }
    .track { height:8px; border-radius:999px; background:var(--glass-border); overflow:hidden; }
    .fill { width:0; height:100%; background:linear-gradient(90deg,var(--c-teal),var(--c-blue)); transition: width .25s var(--ease); }
    .q { font-family:var(--f-display); font-size:clamp(1.6rem,3vw,2.2rem); line-height:1.1; margin:var(--sp-4) 0 var(--sp-6); }
    .assembly,.bank { display:flex; flex-wrap:wrap; gap:10px; min-height:54px; }
    .assembly { padding-bottom:var(--sp-4); border-bottom:1px solid var(--glass-border); margin-bottom:var(--sp-4); }
    .chip { padding:10px 14px; border-radius:var(--r-lg); border:1px solid var(--glass-hi); background:var(--bg-2); color:var(--t-100); cursor:pointer; transition:all var(--dur-fast) var(--ease); }
    .chip:hover { border-color:rgba(0,229,160,.4); background:var(--c-teal-faint); }
    .chip.placed { border-color:var(--c-blue); }
    .controls{display:flex;gap:10px;margin-top:var(--sp-6)}
    .check.active{background:var(--c-teal);color:var(--bg-0)}
    .drawer { position:fixed; left:50%; transform:translate(-50%,120%); bottom:18px; width:min(640px,90vw); z-index:1000; transition:transform var(--dur-mid) var(--ease); }
    .drawer.open { transform:translate(-50%,0); }
    .drawer.bad .card { border-color:rgba(251,113,133,.4); }
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
    .drawer.bad .card{animation:shake 220ms}
    @media(max-width:960px){.quiz-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="bg-canvas" aria-hidden="true"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<div class="page-content">
<nav role="navigation" aria-label="Main navigation"><div class="nav-inner"><a href="index.html" class="logo" aria-label="MoyaCode home"><div class="logo-mark" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M8 6l4-4 4 4M8 18l4 4 4-4M3 12h18" stroke="#030712" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>MoyaCode</a><div class="nav-center"><a href="index.html" class="nav-link">Home</a><a href="selection.html" class="nav-link">Quests</a><a href="quiz.html" class="nav-link active">Learn</a></div><a href="welcome.html" class="nav-cta">Start Free</a></div></nav>
<main class="container">
  <section class="quiz-grid">
    <article class="card card-blue col-7">
      <div class="progress-head"><button id="close-btn" class="btn-outline">Exit</button><span>Question flow</span></div>
      <div class="track"><div class="fill" id="progress-fill"></div></div>
      <h2 class="q" id="question-text"></h2>
      <section class="assembly" id="assembly-line"></section>
      <section class="bank" id="chip-bank"></section>
      <div class="controls"><button class="btn-outline skip" id="skip-btn">Skip</button><button class="btn-outline check" id="check-btn" disabled>Check</button></div>
    </article>
    <aside class="card card-teal col-5">
      <h3 class="section-h2" style="font-size:1.5rem">Run Stats</h3>
      <div class="hearts-display" id="hearts"><div class="heart-chip">❤</div><div class="heart-chip">❤</div><div class="heart-chip">❤</div></div>
      <div class="xp-bar-wrap" style="margin-top:var(--sp-5)"><div class="xp-bar-label"><span class="xp-bar-rank">Builder · Level 7</span><span class="xp-bar-value">680 XP</span></div><div class="xp-bar-track"><div class="xp-bar-fill" style="width:68%"></div></div></div>
      <div style="margin-top:var(--sp-5)"><div class="section-eyebrow">Streak</div><div class="week-grid"><div class="day-chip active">M</div><div class="day-chip active">T</div><div class="day-chip active">W</div><div class="day-chip active">T</div><div class="day-chip active">F</div><div class="day-chip inactive">S</div><div class="day-chip inactive">S</div></div></div>
    </aside>
  </section>
</main>
<div class="drawer" id="feedback-drawer"><div class="card card-teal"><h3 id="feedback-title">Great!</h3><p id="feedback-text" class="section-p"></p><button class="btn-primary" id="next-btn">Continue</button></div></div>
</div>
<script src="quiz.js"></script>
</body>
</html>
