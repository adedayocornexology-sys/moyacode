<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoyaCode Lesson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="quiz.css" />
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body>
  <div class="app-shell" id="app-shell">
    <div id="home-view" class="home-view">
      <div class="home-header">
        <h1>MoyaCode Lessons</h1>
        <p>Pick your class and begin your coding quest.</p>
      </div>
      <div class="class-grid">
        <button class="class-card" onclick="startQuiz('jss1')"><span>JSS1</span><small>Scratch Basics</small></button>
        <button class="class-card" onclick="startQuiz('jss2')"><span>JSS2</span><small>Advanced Scratch</small></button>
        <button class="class-card" onclick="startQuiz('jss3')"><span>JSS3</span><small>Intro to HTML</small></button>
        <button class="class-card" onclick="startQuiz('ss1')"><span>SS1</span><small>Advanced HTML</small></button>
        <button class="class-card" onclick="startQuiz('ss2')"><span>SS2</span><small>CSS Styling</small></button>
        <button class="class-card" onclick="startQuiz('ss3')"><span>SS3</span><small>JavaScript Logic</small></button>
      </div>
    </div>

    <div id="quiz-view" class="quiz-view" style="display:none;">
      <header class="lesson-top">
        <button id="back-btn" class="close-btn" aria-label="Exit lesson">✕</button>
        <div class="progress-track"><div class="progress-fill" id="progress-bar"></div></div>
        <div class="lives-pill" id="hearts-display">❤️ 3</div>
        <span id="xp-display" style="display:none">0</span><span id="streak-display" style="display:none">0</span>
      </header>

      <p class="progress-label" id="progress-label"></p>
      <div class="subject-badge" id="dynamic-subject-badge">Subject</div>

      <section class="question-panel">
        <h2 class="question-text" id="question-text"></h2>
        <div class="assembly-area" id="assembly-area"></div>
        <div class="options-grid" id="options-grid"></div>
      </section>
    </div>

    <div id="end-screen" class="end-screen" style="display:none;">
      <div id="end-emoji" class="end-emoji"></div>
      <h2 class="end-title" id="end-title"></h2>
      <p class="end-sub" id="end-sub"></p>
      <div class="stats-row" id="end-stats"></div>
      <button class="restart-btn" id="restart-btn">Back to Classes</button>
    </div>

    <div class="drawer" id="feedback-drawer">
      <div class="drawer-emoji" id="drawer-emoji"></div>
      <h3 class="drawer-title" id="drawer-title"></h3>
      <p class="drawer-explanation" id="drawer-explanation"></p>
      <div class="teacher-box"><p class="teacher-comment" id="teacher-comment"></p></div>
      <div class="xp-earned" id="xp-earned"></div>
      <button class="continue-btn" id="continue-btn">Continue</button>
    </div>

    <footer class="action-bar" id="action-bar">
      <button class="skip-btn" id="skip-btn">SKIP</button>
      <button class="check-btn" id="check-btn" disabled>CHECK</button>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
